server:
  port: 5007

spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:mysql://localhost:3306/salon_notifications?createDatabaseIfNotExist=true
    username: root
    password: tejastc
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

  rabbitmq:
    port: 5672
    host: localhost
    username: guest
    password: guest

eureka:
  instance:
    hostname: localhost
    port: 5005
    preferIpAddress: false
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8070/eureka
